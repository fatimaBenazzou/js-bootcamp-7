<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Result modal ─────────────────────────────────────── -->
    <div
      id="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="result-message"
    >
      <div id="result-box">
        <div id="result-top">
          <div id="result-icon" aria-hidden="true"></div>
          <h1 id="result-message"></h1>
          <p class="result-time">
            Your time: <span class="time-display"></span> seconds
          </p>
        </div>

        <button id="new-game" type="button">
          <!-- Refresh icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            aria-hidden="true"
          >
            <path
              d="M480.6,235.6c-11.3,0-20.4,9.1-20.4,20.4c0,112.6-91.6,204.2-204.2,204.2
              c-112.6,0-204.2-91.6-204.2-204.2S143.4,51.8,256,51.8c61.5,0,118.5,27.1,157.1,73.7h-70.5
              c-11.3,0-20.4,9.1-20.4,20.4s9.1,20.4,20.4,20.4h114.6c11.3,0,20.4-9.1,20.4-20.4V31.4
              c0-11.3-9.1-20.4-20.4-20.4s-20.4,9.1-20.4,20.4v59C390.7,40.1,325.8,11,256,11
              C120.9,11,11,120.9,11,256c0,135.1,109.9,245,245,245s245-109.9,245-245
              C501,244.7,491.9,235.6,480.6,235.6z"
            />
          </svg>
          New Game
        </button>
      </div>
    </div>

    <!-- Game ─────────────────────────────────────────────── -->
    <main class="game-wrapper">
      <div class="container">
        <header class="header">
          <!-- Difficulty selector -->
          <div class="dropdown">
            <div class="title" tabindex="0">Easy</div>
            <div class="menu">
              <div class="option" tabindex="0">Easy</div>
              <div class="option" tabindex="0">Medium</div>
              <div class="option" tabindex="0">Hard</div>
            </div>
          </div>

          <!-- Remaining flags counter -->
          <div id="flag-countdown" aria-label="Flags remaining">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 287.987 287.987"
              aria-hidden="true"
            >
              <path
                d="M228.702,141.029c-3.114-3.754-3.114-9.193,0-12.946l33.58-40.474
                c2.509-3.024,3.044-7.226,1.374-10.783c-1.671-3.557-5.246-5.828-9.176-5.828h-57.647v60.98
                c0,16.618-13.52,30.138-30.138,30.138h-47.093v25.86c0,5.599,4.539,10.138,10.138,10.138
                h124.74c3.93,0,7.505-2.271,9.176-5.828c1.671-3.557,1.135-7.759-1.374-10.783L228.702,141.029z"
              />
              <path
                d="M176.832,131.978V25.138c0-5.599-4.539-10.138-10.138-10.138H53.37
                c0-8.284-6.716-15-15-15s-15,6.716-15,15c0,7.827,0,253.91,0,257.987
                c0,8.284,6.716,15,15,15s15-6.716,15-15c0-6.943,0-126.106,0-130.871h113.324
                C172.293,142.116,176.832,137.577,176.832,131.978z"
              />
            </svg>
            <span id="flags-left">0</span>
          </div>

          <!-- Timer -->
          <div id="timer" aria-label="Timer">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 559.98 559.98"
              aria-hidden="true"
            >
              <path
                d="M279.99,0C125.601,0,0,125.601,0,279.99c0,154.39,125.601,279.99,279.99,279.99
                c154.39,0,279.99-125.601,279.99-279.99C559.98,125.601,434.38,0,279.99,0z
                M279.99,498.78c-120.644,0-218.79-98.146-218.79-218.79
                c0-120.638,98.146-218.79,218.79-218.79s218.79,98.152,218.79,218.79
                C498.78,400.634,400.634,498.78,279.99,498.78z"
              />
              <path
                d="M304.226,280.326V162.976c0-13.103-10.618-23.721-23.716-23.721
                c-13.102,0-23.721,10.618-23.721,23.721v124.928c0,0.373,0.092,0.723,0.11,1.096
                c-0.312,6.45,1.91,12.999,6.836,17.926l88.343,88.336c9.266,9.266,24.284,9.266,33.543,0
                c9.26-9.266,9.266-24.284,0-33.544L304.226,280.326z"
              />
            </svg>
            <span class="counter">000</span>
          </div>

          <!-- Quick-restart button -->
          <svg
            id="refresh"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            role="button"
            tabindex="0"
            aria-label="New game"
          >
            <path
              d="M480.6,235.6c-11.3,0-20.4,9.1-20.4,20.4c0,112.6-91.6,204.2-204.2,204.2
              c-112.6,0-204.2-91.6-204.2-204.2S143.4,51.8,256,51.8c61.5,0,118.5,27.1,157.1,73.7h-70.5
              c-11.3,0-20.4,9.1-20.4,20.4s9.1,20.4,20.4,20.4h114.6c11.3,0,20.4-9.1,20.4-20.4V31.4
              c0-11.3-9.1-20.4-20.4-20.4s-20.4,9.1-20.4,20.4v59C390.7,40.1,325.8,11,256,11
              C120.9,11,11,120.9,11,256c0,135.1,109.9,245,245,245s245-109.9,245-245
              C501,244.7,491.9,235.6,480.6,235.6z"
            />
          </svg>
        </header>

        <!-- Grid cells are injected by JS -->
        <section class="grid" aria-label="Minesweeper grid"></section>
      </div>
    </main>

    <script src="instructions.js" defer></script>
  </body>
</html>
